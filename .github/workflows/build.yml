name: Build SwiftShare

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # Android APK Build
  # ─────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Build APK (universal)
        run: flutter build apk --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            build/app/outputs/apk/release/app-release.apk
            build/app/outputs/apk/release/app-arm64-v8a-release.apk
            build/app/outputs/apk/release/app-armeabi-v7a-release.apk
            build/app/outputs/apk/release/app-x86_64-release.apk
          retention-days: 30

  # ─────────────────────────────────────────
  # Windows EXE Build
  # ─────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows build
        run: |
          $src = "build\windows\x64\runner\Release"
          $dest = "SwiftShare-Windows"
          Copy-Item -Path $src -Destination $dest -Recurse
          Compress-Archive -Path $dest -DestinationPath SwiftShare-Windows.zip
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: SwiftShare-Windows.zip
          retention-days: 30

  # ─────────────────────────────────────────
  # Release (on tag push)
  # ─────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android/app-release.apk
            artifacts/android/app-arm64-v8a-release.apk
            artifacts/windows/SwiftShare-Windows.zip
          body: |
            ## SwiftShare ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Android (Universal) | app-release.apk | All devices |
            | Android (ARM64) | app-arm64-v8a-release.apk | Modern devices, smaller |
            | Windows | SwiftShare-Windows.zip | Extract and run |

            ### Features
            - WiFi LAN transfer (up to 40 MB/s)
            - Parallel chunked download (IDM-style)
            - Bluetooth & Nearby transfer
            - Android ↔ Android, Android ↔ Windows
